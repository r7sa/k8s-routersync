# This rule is not used by the project k8s-routersync itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to control.routersync.r7sa.github.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: k8s-routersync
    app.kubernetes.io/managed-by: kustomize
  name: routersync-viewer-role
rules:
- apiGroups:
  - control.routersync.r7sa.github.io
  resources:
  - routersyncs
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - control.routersync.r7sa.github.io
  resources:
  - routersyncs/status
  verbs:
  - get
