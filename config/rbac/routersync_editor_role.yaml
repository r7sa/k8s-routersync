# This rule is not used by the project k8s-routersync itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the control.routersync.r7sa.github.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: k8s-routersync
    app.kubernetes.io/managed-by: kustomize
  name: routersync-editor-role
rules:
- apiGroups:
  - control.routersync.r7sa.github.io
  resources:
  - routersyncs
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - control.routersync.r7sa.github.io
  resources:
  - routersyncs/status
  verbs:
  - get
