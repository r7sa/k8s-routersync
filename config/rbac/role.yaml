---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - control.routersync.r7sa.github.io
  resources:
  - routersyncs
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - control.routersync.r7sa.github.io
  resources:
  - routersyncs/finalizers
  verbs:
  - update
- apiGroups:
  - control.routersync.r7sa.github.io
  resources:
  - routersyncs/status
  verbs:
  - get
  - patch
  - update
